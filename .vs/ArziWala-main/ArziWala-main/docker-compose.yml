version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    container_name: arziwala-app

  # Playwright tests in Docker
  playwright:
    image: mcr.microsoft.com/playwright:v1.49.1-noble
    environment:
      - CI=true
    working_dir: /app
    volumes:
      - .:/app
    command: npx playwright test
    depends_on:
      - app
    network_mode: host
